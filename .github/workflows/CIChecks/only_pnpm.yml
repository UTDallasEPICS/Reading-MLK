name: Only Allow pnpm lockfile

on:
  pull_request:
    branches:
      - main

jobs:
  check-lockfile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block non-pnpm lockfiles
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Checking lockfiles changed in this PR..."

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          echo "$changed_files"

          blocked_files="$(echo "$changed_files" | grep -E '(^|/)(package-lock\.json|npm-shrinkwrap\.json|yarn\.lock|bun\.lockb|bun\.lock)$' || true)"

          if [ -n "$blocked_files" ]; then
            echo "Error: Only pnpm-lock.yaml is allowed in this project."
            echo "Remove these blocked lockfiles:"
            echo "$blocked_files"
            exit 1
          fi

          echo "No blocked lockfiles found."